[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
solc = "0.8.20"
evm_version = "cancun"
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/"
]

# Allow multiple optimization runs for testing
optimizer = true
optimizer_runs = 200

# Use via-ir for better EVM compatibility
via_ir = false

[profile.testnet]
# Robinhood Chain Testnet — used when deploying
# forge script script/Deploy.s.sol --rpc-url $RH_RPC_URL --broadcast

[rpc_endpoints]
robinhood_testnet = "${RH_RPC_URL}"

[etherscan]
robinhood_testnet = { key = "empty", url = "https://explorer.testnet.chain.robinhood.com/api/" }
